<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="instagram-wrapper">
        <div class="instagram-phone">
            <img src="./imgs/Iphone.png" alt="Celular">
        </div>
        <div class="instagram-continue">
            <div class="container">
                <img src="./imgs/Instagram logo.png" class="instagram-logo" alt="logo">
                <div class="profile-photo">
                    <img src="./imgs/person.jpg" alt="Foto de Perfil">
                </div>
                <a href="#" class="instagram-login-btn">Continuar como rodrigoandradenft</a>
                <a href="#" class="instagram-remove-acc-btn">Remover conta</a>
            </div>
            <div class="container">
                <p class="not-account">Não é rodrigoandradenft?</p>
                <p class="not-account">
                    <a href="#" class="blue-link">Trocar de conta</a>
                    ou
                    <a href="#"  class="blue-link">Cadastre-se</a>
                </p>
            </div>
            <div class="get-app">
                <p class="store-text">Obtenha o aplicativo.</p>
                <div class="download">
                    <a href="#" class="app-download"></a>
                    <a href="#" class="app-download"></a>
                </div>
            </div>
            
        </div>

    </div>
    
</body>
</html>
